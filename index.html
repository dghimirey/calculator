<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e293b' rx='20'/%3E%3Ctext x='50' y='72' font-size='68' text-anchor='middle' fill='%23fbbf24'%3E🧮%3C/text%3E%3C/svg%3E">
</head>
<body>
    <main class="calculator-app">
        <div class="calculator-container">
            <div class="calc-header" aria-hidden="true">
                <span class="calc-badge">⚡ CALC</span>
                <i class="fa-regular fa-circle-dot"></i>
            </div>

            <div class="display">
                <div class="display-status">
                    <span class="memory-status" id="memoryStatusIcon"></span>
                    <span class="mode-status">standard</span>
                </div>
                <div class="expression-display" id="expressionDisplay">0</div>
                <div class="result-display" id="resultDisplay">0</div>
            </div>

            <div class="keypad">
                <button class="key mem-action" data-action="memory-clear">MC</button>
                <button class="key mem-action" data-action="memory-recall">MR</button>
                <button class="key mem-action" data-action="memory-add">M+</button>
                <button class="key mem-action" data-action="memory-subtract">M-</button>

                <button class="key action" data-action="clear">AC</button>
                <button class="key action" data-action="delete"><i class="fas fa-backspace"></i></button>
                <button class="key operator" data-action="modulo">%</button>
                <button class="key operator" data-action="divide">÷</button>

                <button class="key number" data-number="7">7</button>
                <button class="key number" data-number="8">8</button>
                <button class="key number" data-number="9">9</button>
                <button class="key operator" data-action="multiply">×</button>

                <button class="key number" data-number="4">4</button>
                <button class="key number" data-number="5">5</button>
                <button class="key number" data-number="6">6</button>
                <button class="key operator" data-action="subtract">−</button>

                <button class="key number" data-number="1">1</button>
                <button class="key number" data-number="2">2</button>
                <button class="key number" data-number="3">3</button>
                <button class="key operator" data-action="add">+</button>

                <button class="key number wide" data-number="0">0</button>
                <button class="key number" data-action="decimal">.</button>
                <button class="key function" data-action="square-root">√</button>
                <button class="key function" data-action="sign">±</button>
                <button class="key equals" data-action="equals">=</button>
            </div>

            <div class="keyboard-hint">
                <i class="fa-regular fa-keyboard"></i>
                <span><kbd>Enter</kbd> <kbd>Esc</kbd> <kbd>⌫</kbd> <kbd>%</kbd> <kbd>+-*/</kbd></span>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
