<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Calculator | Modern Design</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Your existing CSS will be applied on top (style.css) -->
    <link rel="stylesheet" href="style.css">
    <!-- Modern favicon with clear identity -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e293b' rx='20'/%3E%3Ctext x='50' y='72' font-size='68' text-anchor='middle' fill='%23fbbf24' font-family='Arial, sans-serif' font-weight='bold'%3E%3C/text%3E%3C/svg%3E">
    <meta name="description" content="Modern calculator with responsive design, keyboard support, and smooth interaction">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <!-- Main calculator widget with enhanced semantic structure -->
    <main class="calculator-app" role="main" aria-label="Advanced Calculator Interface">
        <div class="calculator-container">
            <!-- Header / branding (optional decorative but adds context) -->
            <div class="calc-header" aria-hidden="true">
                <span class="calc-badge">⚡ smart calc</span>
                <i class="fa-regular fa-circle-dot"></i>
            </div>

            <!-- Calculator display area: now includes memory indicators and better readability -->
            <div class="display" role="region" aria-label="Calculator display panel">
                <!-- Mini status row for memory / mode (visual hint) -->
                <div class="display-status" aria-hidden="true">
                    <span class="memory-status" id="memoryStatusIcon"> </span>
                    <span class="mode-status" id="modeStatus">standard</span>
                </div>
                <!-- Expression display shows full formula -->
                <div class="expression-display" id="expressionDisplay" aria-live="polite" aria-label="Current expression">
                    0
                </div>
                <!-- Result display shows current result or input number -->
                <div class="result-display" id="resultDisplay" aria-live="assertive" aria-label="Calculated result">
                    0
                </div>
            </div>

            <!-- Calculator keypad - improved grid layout with better grouping & additional functions -->
            <div class="keypad" role="grid" aria-label="Calculator keypad, use mouse or keyboard">
                <!-- Row 1: Memory & utility functions (enhanced) -->
                <button class="key mem-action" data-action="memory-clear" aria-label="Memory clear (MC)">
                    MC
                </button>
                <button class="key mem-action" data-action="memory-recall" aria-label="Memory recall (MR)">
                    MR
                </button>
                <button class="key mem-action" data-action="memory-add" aria-label="Memory add (M+)">
                    M+
                </button>
                <button class="key mem-action" data-action="memory-subtract" aria-label="Memory subtract (M-)">
                    M-
                </button>

                <!-- Row 2: Clear, delete, and basic operators -->
                <button class="key action" data-action="clear" aria-label="Clear all (AC)">
                    <span>AC</span>
                </button>
                <button class="key action" data-action="delete" aria-label="Delete last character (⌫)">
                    <i class="fas fa-backspace" aria-hidden="true"></i><span class="visually-hidden">Backspace</span>
                </button>
                <button class="key operator" data-action="modulo" aria-label="Modulo operator (percent)">
                    %
                </button>
                <button class="key operator" data-action="divide" aria-label="Divide">
                    <i class="fas fa-divide" aria-hidden="true"></i><span class="operator-symbol">÷</span>
                </button>

                <!-- Row 3: Digits 7 8 9 & multiply -->
                <button class="key number" data-number="7" aria-label="Number 7">
                    7
                </button>
                <button class="key number" data-number="8" aria-label="Number 8">
                    8
                </button>
                <button class="key number" data-number="9" aria-label="Number 9">
                    9
                </button>
                <button class="key operator" data-action="multiply" aria-label="Multiply">
                    <i class="fas fa-times" aria-hidden="true"></i><span class="operator-symbol">×</span>
                </button>

                <!-- Row 4: Digits 4 5 6 & subtract -->
                <button class="key number" data-number="4" aria-label="Number 4">
                    4
                </button>
                <button class="key number" data-number="5" aria-label="Number 5">
                    5
                </button>
                <button class="key number" data-number="6" aria-label="Number 6">
                    6
                </button>
                <button class="key operator" data-action="subtract" aria-label="Subtract">
                    <i class="fas fa-minus" aria-hidden="true"></i><span class="operator-symbol">-</span>
                </button>

                <!-- Row 5: Digits 1 2 3 & add -->
                <button class="key number" data-number="1" aria-label="Number 1">
                    1
                </button>
                <button class="key number" data-number="2" aria-label="Number 2">
                    2
                </button>
                <button class="key number" data-number="3" aria-label="Number 3">
                    3
                </button>
                <button class="key operator" data-action="add" aria-label="Add">
                    <i class="fas fa-plus" aria-hidden="true"></i><span class="operator-symbol">+</span>
                </button>

                <!-- Row 6: Zero (wide), decimal, equals and extra function (sqrt + sign) -->
                <button class="key number wide" data-number="0" aria-label="Number 0">
                    0
                </button>
                <button class="key number" data-action="decimal" aria-label="Decimal point">
                    .
                </button>
                <button class="key function" data-action="square-root" aria-label="Square root">
                    √
                </button>
                <button class="key function" data-action="sign" aria-label="Toggle positive/negative">
                    ±
                </button>
                <button class="key equals" data-action="equals" aria-label="Calculate result (equals)">
                    <i class="fas fa-equals" aria-hidden="true"></i><span class="equals-text">=</span>
                </button>
            </div>

            <!-- Short keyboard hint area: subtle tooltip for user convenience -->
            <div class="keyboard-hint" aria-live="polite" aria-label="Keyboard shortcuts">
                <i class="fa-regular fa-keyboard"></i>
                <span>Press <kbd>Enter</kbd> = , <kbd>Esc</kbd> AC, <kbd>⌫</kbd> Delete, <kbd>%</kbd> Mod</span>
            </div>
        </div>
    </main>

    <!-- No extra inline scripts, your existing script.js will handle logic -->
    <script src="script.js"></script>
</body>
</html>
